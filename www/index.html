<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Q-Ai</title>
    <!-- Fonts: Inter (sans) + Lora (serif) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Prevent theme flash: apply stored theme before React renders -->
    <script>
      try {
        const s = localStorage.getItem("q-ai-theme");
        const dark = s ? JSON.parse(s).state?.isDark !== false : true;
        document.documentElement.dataset.theme = dark ? "dark" : "light";
      } catch (e) {
        document.documentElement.dataset.theme = "dark";
      }
    </script>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
