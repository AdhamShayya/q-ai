<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" fill="none">
  <defs>
    <linearGradient id="gl" x1="15" y1="40" x2="130" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1a2332"/>
      <stop offset="50%"  stop-color="#6c7d50"/>
      <stop offset="100%" stop-color="#4a7fa5"/>
    </linearGradient>
    <filter id="sh" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1a2332" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Large 4-pointed sparkle cx=55 cy=80 R=40 -->
  <path
    d="M55,40 C58,60 75,77 95,80 C75,83 58,100 55,120 C52,100 35,83 15,80 C35,77 52,60 55,40 Z"
    fill="url(#gl)" filter="url(#sh)"
  />

  <!-- Small 4-pointed sparkle cx=112 cy=54 R=18 -->
  <path
    d="M112,36 C113.5,45 121,52.5 130,54 C121,55.5 113.5,63 112,72 C110.5,63 103,55.5 94,54 C103,52.5 110.5,45 112,36 Z"
    fill="url(#gl)" filter="url(#sh)"
  />

  <!-- Cardinal accent dots -->
  <circle cx="112" cy="27" r="2.5" fill="url(#gl)" opacity="0.60"/>
  <circle cx="139" cy="54" r="2.5" fill="url(#gl)" opacity="0.60"/>
  <circle cx="112" cy="81" r="2.5" fill="url(#gl)" opacity="0.60"/>
  <circle cx="85"  cy="54" r="2.5" fill="url(#gl)" opacity="0.60"/>
</svg>
