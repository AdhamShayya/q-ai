<svg xmlns="http://www.w3.org/2000/svg" viewBox="-12 -12 184 184" fill="none">
  <defs>

    <!-- Main ring gradient: violet → indigo → electric cyan -->
    <linearGradient id="rd" x1="20" y1="20" x2="140" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="45%"  stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>

    <!-- Neural-node gradient: lavender → cyan -->
    <linearGradient id="nd" x1="63" y1="57" x2="97" y2="91" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <!-- Soft radial ambient behind the whole mark -->
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow for ring + tail -->
    <filter id="glow-r" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Lighter glow for neural dots -->
    <filter id="glow-n" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- ── Ambient aura ─────────────────────────────────────────── -->
  <circle cx="80" cy="77" r="64" fill="url(#aura)"/>

  <!-- ── Q ring ──────────────────────────────────────────────────
       Circle c=(80,77) r=38 | circumference≈238.76
       207px solid (≈311°) + 32px gap (≈48°)
       rotate(45°) → gap lands at ~3:00–4:30 o'clock (right side)
  ─────────────────────────────────────────────────────────────── -->
  <circle
    cx="80" cy="77" r="38"
    stroke="url(#rd)"
    stroke-width="12"
    stroke-linecap="round"
    stroke-dasharray="207 32"
    transform="rotate(45, 80, 77)"
    filter="url(#glow-r)"
  />

  <!-- ── Q tail ─────────────────────────────────────────────────── -->
  <line
    x1="112" y1="96"
    x2="135" y2="119"
    stroke="url(#rd)"
    stroke-width="12"
    stroke-linecap="round"
    filter="url(#glow-r)"
  />

  <!-- ── Outer ring pulse (very faint border ring for depth) ──── -->
  <circle
    cx="80" cy="77" r="54"
    stroke="rgba(124,58,237,0.14)"
    stroke-width="1"
    fill="none"
  />

  <!-- ── Neural constellation ───────────────────────────────── -->

  <!-- Central node -->
  <circle cx="80" cy="63" r="6.5" fill="url(#nd)" filter="url(#glow-n)"/>

  <!-- Satellite nodes -->
  <circle cx="63" cy="84" r="4.5" fill="#a78bfa" opacity="0.95" filter="url(#glow-n)"/>
  <circle cx="97" cy="84" r="4.5" fill="#22d3ee" opacity="0.95" filter="url(#glow-n)"/>

  <!-- Connecting lines -->
  <line x1="80" y1="69.5" x2="63" y2="79.5" stroke="#a78bfa" stroke-width="1.5" opacity="0.72"/>
  <line x1="80" y1="69.5" x2="97" y2="79.5" stroke="#22d3ee" stroke-width="1.5" opacity="0.72"/>
  <line x1="63" y1="84"   x2="97" y2="84"   stroke="url(#nd)"  stroke-width="1.5" opacity="0.5"/>

  <!-- Inner triangle highlight (very subtle fill) -->
  <polygon
    points="80,63 63,84 97,84"
    fill="rgba(124,58,237,0.07)"
    stroke="none"
  />

  <!-- Spark accent at tail end -->
  <circle cx="135" cy="119" r="4" fill="#06b6d4" filter="url(#glow-n)" opacity="0.9"/>

  <!-- Tiny extra star-spark beside the tail (gives "AI spark" feel) -->
  <circle cx="143" cy="112" r="2"   fill="#c4b5fd" opacity="0.6"/>
  <circle cx="128" cy="126" r="1.5" fill="#22d3ee" opacity="0.5"/>

</svg>
